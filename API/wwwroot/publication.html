<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Publication Detail</title>
  <script>
    if (localStorage.getItem('theme') === 'dark' ||
        (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <link rel="stylesheet" href="dark-mode.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen" x-data="detailApp()" x-init="init()">

  <header class="bg-white shadow-sm">
    <div class="max-w-3xl mx-auto px-4 py-4 flex items-center gap-3">
      <a href="index.html" class="text-indigo-600 hover:underline text-sm">← Back to search</a>
      <span class="text-gray-300">|</span>
      <h1 class="text-lg font-bold text-indigo-700">Publication Detail</h1>
      <button onclick="document.documentElement.classList.toggle('dark');localStorage.setItem('theme',document.documentElement.classList.contains('dark')?'dark':'light')"
        class="ml-auto p-2 rounded-lg text-gray-500 hover:bg-gray-100 shrink-0" title="Toggle dark mode">
        <svg class="w-5 h-5 block dark:hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
        </svg>
        <svg class="w-5 h-5 hidden dark:block" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
        </svg>
      </button>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-4 py-8">

    <!-- Loading -->
    <div x-show="loading" class="flex justify-center py-16">
      <svg class="animate-spin h-8 w-8 text-indigo-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
      </svg>
    </div>

    <!-- Error state -->
    <div x-show="!loading && error" class="bg-red-50 border border-red-200 rounded-xl p-6 text-center">
      <p class="text-red-600 font-medium" x-text="error"></p>
      <a href="index.html" class="mt-3 inline-block text-sm text-indigo-600 hover:underline">Go back</a>
    </div>

    <!-- Detail -->
    <div x-show="!loading && !error && pub" class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 space-y-5">

      <div>
        <h2 class="text-2xl font-bold text-gray-800 leading-snug" x-text="pub?.title"></h2>
        <p class="text-indigo-600 mt-1" x-text="(pub?.authors || []).map(a => [a.firstName, a.middleName, a.lastName].filter(Boolean).join(' ')).join(', ')"></p>
      </div>

      <div class="flex flex-wrap gap-4 text-sm text-gray-500">
        <span x-show="pub?.year"><strong>Year:</strong> <span x-text="pub?.year"></span></span>
        <span x-show="pub?.doi"><strong>DOI:</strong>
          <a :href="'https://doi.org/' + pub?.doi" target="_blank" class="text-indigo-500 hover:underline" x-text="pub?.doi"></a>
        </span>
      </div>

      <div x-show="pub?.keywords">
        <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1">Keywords</p>
        <div class="flex flex-wrap gap-1">
          <template x-for="kw in splitCsv(pub?.keywords)" :key="kw">
            <span class="text-xs bg-indigo-50 text-indigo-700 px-2 py-0.5 rounded-full" x-text="kw"></span>
          </template>
        </div>
      </div>

      <div x-show="pub?.languages">
        <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1">Languages</p>
        <div class="flex flex-wrap gap-1">
          <template x-for="lang in splitCsv(pub?.languages)" :key="lang">
            <span class="text-xs bg-green-50 text-green-700 px-2 py-0.5 rounded-full" x-text="lang"></span>
          </template>
        </div>
      </div>

      <div x-show="pub?.publicationTypes">
        <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1">Publication Types</p>
        <div class="flex flex-wrap gap-1">
          <template x-for="pt in splitCsv(pub?.publicationTypes)" :key="pt">
            <span class="text-xs bg-amber-50 text-amber-700 px-2 py-0.5 rounded-full" x-text="pt"></span>
          </template>
        </div>
      </div>

      <div x-show="pub?.abstract">
        <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1">Abstract</p>
        <p class="text-sm text-gray-700 leading-relaxed" x-text="pub?.abstract"></p>
      </div>

      <div x-show="pub?.body">
        <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1">Full Text</p>
        <p class="text-sm text-gray-700 leading-relaxed whitespace-pre-wrap" x-text="pub?.body"></p>
      </div>

      <div class="flex items-center gap-3 pt-2 border-t border-gray-100">
        <a x-show="pub?.pdfFileName"
           :href="'/api/publications/' + pub?.id + '/download'"
           class="bg-indigo-600 text-white text-sm px-4 py-2 rounded-lg hover:bg-indigo-700">
          Download PDF
        </a>
        <a href="index.html" class="text-sm text-gray-500 hover:text-gray-700">← Back</a>
        <span class="ml-auto text-xs text-gray-300"
              x-text="pub ? ('Added ' + new Date(pub.createdAt).toLocaleDateString()) : ''"></span>
      </div>
    </div>
  </main>

  <script>
    function detailApp() {
      return {
        pub: null,
        loading: false,
        error: null,

        async init() {
          const params = new URLSearchParams(window.location.search);
          const id = parseInt(params.get('id'));
          if (!id || isNaN(id)) { this.error = 'No publication ID provided.'; return; }

          this.loading = true;
          try {
            const res = await fetch(`/api/publications/${id}`);
            if (!res.ok) { this.error = res.status === 404 ? 'Publication not found.' : 'Failed to load publication.'; return; }
            this.pub = await res.json();
          } catch {
            this.error = 'Network error — please try again.';
          } finally {
            this.loading = false;
          }
        },

        splitCsv(val) {
          if (!val) return [];
          return val.split(',').map(s => s.trim()).filter(Boolean);
        }
      };
    }
  </script>
</body>
</html>
