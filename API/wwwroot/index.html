<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Research Publications</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen" x-data="searchApp()" x-init="init()">

  <header class="bg-white shadow-sm sticky top-0 z-10">
    <div class="max-w-5xl mx-auto px-4 py-4 flex items-center gap-4">
      <h1 class="text-xl font-bold text-indigo-700 shrink-0">Research Publications</h1>
      <input
        type="search"
        x-model="query"
        @keyup.enter="search()"
        @input.debounce.400ms="onQueryInput()"
        placeholder="Search titles, abstracts, keywords…"
        class="flex-1 border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
      />
      <button @click="search()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-indigo-700">Search</button>
      <a href="admin.html" class="text-sm text-gray-500 hover:text-indigo-600 ml-2">Admin</a>
    </div>

    <!-- Filters toggle row -->
    <div class="max-w-5xl mx-auto px-4 pb-2 flex items-center gap-3">
      <button @click="filtersOpen = !filtersOpen"
        class="flex items-center gap-1.5 text-sm border rounded-lg px-3 py-1.5 hover:bg-gray-50 transition-colors"
        :class="activeFilterCount > 0 ? 'border-indigo-400 text-indigo-700 bg-indigo-50' : 'border-gray-300 text-gray-600'">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M3 3a1 1 0 011-1h12a1 1 0 011 1v3a1 1 0 01-.293.707L13 10.414V15a1 1 0 01-.553.894l-4 2A1 1 0 017 17v-6.586L3.293 6.707A1 1 0 013 6V3z" clip-rule="evenodd" />
        </svg>
        Filters
        <span x-show="activeFilterCount > 0"
          class="bg-indigo-600 text-white text-xs rounded-full px-1.5 leading-5"
          x-text="activeFilterCount"></span>
      </button>
      <button x-show="activeFilterCount > 0" @click="clearFilters()"
        class="text-sm text-gray-400 hover:text-red-500 underline">Clear All</button>
      <span class="ml-auto text-xs text-gray-400" x-show="!isSearchMode" x-text="'Showing ' + total + ' publications'"></span>
      <span class="ml-auto text-xs text-gray-400" x-show="isSearchMode" x-text="results.length + ' results for &quot;' + lastQuery + '&quot;'"></span>
    </div>

    <!-- Collapsible filter panel -->
    <div x-show="filtersOpen" x-transition class="max-w-5xl mx-auto px-4 pb-4">
      <div class="border border-gray-200 rounded-xl bg-white p-5 flex flex-wrap gap-8">

        <!-- Year Range -->
        <div class="flex flex-col gap-1.5">
          <span class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Year Range</span>
          <div class="flex items-center gap-2">
            <input type="number" x-model="filterYearFrom"
              @input.debounce.400ms="applyFilters()"
              placeholder="From"
              class="w-24 border border-gray-300 rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
            <span class="text-gray-400">–</span>
            <input type="number" x-model="filterYearTo"
              @input.debounce.400ms="applyFilters()"
              placeholder="To"
              class="w-24 border border-gray-300 rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
          </div>
        </div>

        <!-- Keywords -->
        <div class="flex flex-col gap-1.5 min-w-[190px]">
          <span class="text-xs font-semibold text-gray-500 uppercase tracking-wide">
            Keywords
            <span x-show="selectedKeywords.length > 0" class="normal-case font-normal text-indigo-600"
              x-text="'(' + selectedKeywords.length + ' selected)'"></span>
          </span>
          <input type="text" x-model="keywordSearch" placeholder="Search keywords…"
            class="border border-gray-300 rounded-lg px-2 py-1 text-xs focus:outline-none focus:ring-2 focus:ring-indigo-400" />
          <div class="overflow-y-auto max-h-44 flex flex-col gap-0.5 pr-1">
            <template x-for="kw in filteredKeywords" :key="kw">
              <label class="flex items-center gap-2 text-sm cursor-pointer hover:bg-indigo-50 rounded px-1 py-0.5">
                <input type="checkbox" :value="kw" x-model="selectedKeywords"
                  @change="applyFilters()" class="accent-indigo-600 shrink-0" />
                <span x-text="kw" class="truncate"></span>
              </label>
            </template>
            <p x-show="filteredKeywords.length === 0" class="text-xs text-gray-400 px-1 py-1">No keywords found.</p>
          </div>
        </div>

        <!-- Authors -->
        <div class="flex flex-col gap-1.5 min-w-[190px]">
          <span class="text-xs font-semibold text-gray-500 uppercase tracking-wide">
            Authors
            <span x-show="selectedAuthors.length > 0" class="normal-case font-normal text-indigo-600"
              x-text="'(' + selectedAuthors.length + ' selected)'"></span>
          </span>
          <input type="text" x-model="authorSearch" placeholder="Search authors…"
            class="border border-gray-300 rounded-lg px-2 py-1 text-xs focus:outline-none focus:ring-2 focus:ring-indigo-400" />
          <div class="overflow-y-auto max-h-44 flex flex-col gap-0.5 pr-1">
            <template x-for="author in filteredAuthors" :key="author">
              <label class="flex items-center gap-2 text-sm cursor-pointer hover:bg-indigo-50 rounded px-1 py-0.5">
                <input type="checkbox" :value="author" x-model="selectedAuthors"
                  @change="applyFilters()" class="accent-indigo-600 shrink-0" />
                <span x-text="author" class="truncate"></span>
              </label>
            </template>
            <p x-show="filteredAuthors.length === 0" class="text-xs text-gray-400 px-1 py-1">No authors found.</p>
          </div>
        </div>

      </div>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 py-6">
    <!-- Loading -->
    <div x-show="loading" class="flex justify-center py-12">
      <svg class="animate-spin h-8 w-8 text-indigo-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
      </svg>
    </div>

    <!-- Empty state -->
    <div x-show="!loading && results.length === 0" class="text-center py-16 text-gray-400">
      <p class="text-lg">No publications found.</p>
      <p class="text-sm mt-1" x-show="isSearchMode">Try a different query or clear the filters.</p>
    </div>

    <!-- Cards -->
    <div x-show="!loading" class="grid gap-4">
      <template x-for="pub in results" :key="pub.id">
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 hover:shadow-md transition-shadow">
          <div class="flex justify-between items-start gap-4">
            <div class="min-w-0">
              <h2 class="font-semibold text-gray-800 text-base leading-snug" x-text="pub.title"></h2>
              <p class="text-sm text-indigo-600 mt-0.5" x-text="(pub.authors || []).join(', ')"></p>
            </div>
            <span class="text-xs text-gray-400 whitespace-nowrap mt-0.5" x-text="pub.year ?? ''"></span>
          </div>

          <!-- Keyword tags -->
          <div class="flex flex-wrap gap-1 mt-2" x-show="pub.keywords">
            <template x-for="kw in splitKeywords(pub.keywords)" :key="kw">
              <span class="text-xs bg-indigo-50 text-indigo-700 px-2 py-0.5 rounded-full" x-text="kw"></span>
            </template>
          </div>

          <!-- Abstract snippet -->
          <p class="text-sm text-gray-500 mt-2 line-clamp-2"
             x-text="pub.abstractSnippet || pub.abstract || ''"></p>

          <!-- Actions -->
          <div class="flex gap-2 mt-3">
            <a :href="'publication.html?id=' + pub.id"
               class="text-sm bg-indigo-600 text-white px-3 py-1.5 rounded-lg hover:bg-indigo-700">View</a>
            <a x-show="pub.pdfFileName"
               :href="'/api/publications/' + pub.id + '/download'"
               class="text-sm bg-gray-100 text-gray-700 px-3 py-1.5 rounded-lg hover:bg-gray-200">
              Download PDF
            </a>
          </div>
        </div>
      </template>
    </div>

    <!-- Pagination (browse mode only) -->
    <div x-show="!isSearchMode && !loading && totalPages > 1" class="flex justify-center gap-2 mt-8">
      <button @click="changePage(page - 1)" :disabled="page <= 1"
        class="px-3 py-1.5 rounded-lg border text-sm disabled:opacity-40 hover:bg-gray-50">← Prev</button>
      <span class="px-3 py-1.5 text-sm text-gray-500" x-text="'Page ' + page + ' / ' + totalPages"></span>
      <button @click="changePage(page + 1)" :disabled="page >= totalPages"
        class="px-3 py-1.5 rounded-lg border text-sm disabled:opacity-40 hover:bg-gray-50">Next →</button>
    </div>
  </main>

  <script>
    function searchApp() {
      return {
        query: '',
        filterYearFrom: '',
        filterYearTo: '',
        selectedAuthors: [],
        selectedKeywords: [],
        availableAuthors: [],
        availableKeywords: [],
        authorSearch: '',
        keywordSearch: '',
        filtersOpen: false,
        results: [],
        total: 0,
        page: 1,
        pageSize: 20,
        loading: false,
        isSearchMode: false,
        lastQuery: '',

        get totalPages() {
          return Math.max(1, Math.ceil(this.total / this.pageSize));
        },

        get activeFilterCount() {
          let n = 0;
          if (this.filterYearFrom) n++;
          if (this.filterYearTo)   n++;
          n += this.selectedAuthors.length;
          n += this.selectedKeywords.length;
          return n;
        },

        get filteredAuthors() {
          if (!this.authorSearch) return this.availableAuthors;
          const q = this.authorSearch.toLowerCase();
          return this.availableAuthors.filter(a => a.toLowerCase().includes(q));
        },

        get filteredKeywords() {
          if (!this.keywordSearch) return this.availableKeywords;
          const q = this.keywordSearch.toLowerCase();
          return this.availableKeywords.filter(k => k.toLowerCase().includes(q));
        },

        async init() {
          await Promise.all([this.loadFacets(), this.loadAll()]);
        },

        async loadFacets() {
          try {
            const [authorsRes, keywordsRes] = await Promise.all([
              fetch('/api/publications/authors'),
              fetch('/api/publications/keywords')
            ]);
            this.availableAuthors  = await authorsRes.json();
            this.availableKeywords = await keywordsRes.json();
          } catch {}
        },

        buildFilterParams(params) {
          if (this.filterYearFrom) params.append('yearFrom', this.filterYearFrom);
          if (this.filterYearTo)   params.append('yearTo',   this.filterYearTo);
          this.selectedAuthors.forEach(a  => params.append('authors',  a));
          this.selectedKeywords.forEach(k => params.append('keywords', k));
        },

        async loadAll() {
          this.loading = true;
          this.isSearchMode = false;
          try {
            const params = new URLSearchParams({ page: this.page, pageSize: this.pageSize });
            this.buildFilterParams(params);
            const res  = await fetch('/api/publications?' + params);
            const data = await res.json();
            this.results = data.items || [];
            this.total   = data.total ?? 0;
          } catch (e) {
            this.results = [];
          } finally {
            this.loading = false;
          }
        },

        onQueryInput() {
          this.page = 1;
          if (!this.query.trim()) {
            this.loadAll();
          } else {
            this.search();
          }
        },

        async search() {
          if (!this.query.trim()) { this.page = 1; await this.loadAll(); return; }
          this.loading = true;
          this.isSearchMode = true;
          this.lastQuery = this.query;
          try {
            const params = new URLSearchParams({ q: this.query });
            this.buildFilterParams(params);
            const res = await fetch('/api/search?' + params);
            this.results = await res.json();
          } catch (e) {
            this.results = [];
          } finally {
            this.loading = false;
          }
        },

        applyFilters() {
          this.page = 1;
          if (this.query.trim()) {
            this.search();
          } else {
            this.loadAll();
          }
        },

        async clearFilters() {
          this.query          = '';
          this.filterYearFrom = '';
          this.filterYearTo   = '';
          this.selectedAuthors  = [];
          this.selectedKeywords = [];
          this.authorSearch   = '';
          this.keywordSearch  = '';
          this.page = 1;
          await this.loadAll();
        },

        async changePage(newPage) {
          if (newPage < 1 || newPage > this.totalPages) return;
          this.page = newPage;
          await this.loadAll();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        },

        splitKeywords(kw) {
          if (!kw) return [];
          return kw.split(',').map(s => s.trim()).filter(Boolean);
        }
      };
    }
  </script>
</body>
</html>
